<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>CrewAI 亚马逊跨境电商调研平台</h1>
        </div>
        <div class="nav">
            <button class="nav-btn active" data-page="dashboard">仪表板</button>
            <button class="nav-btn" data-page="new">新建调研</button>
            <button class="nav-btn" data-page="history">历史记录</button>
        </div>
        
        <div class="content" id="dashboard-page">
            <div class="metrics">
                <div class="metric"><div class="metric-label">Agent 数量</div><div class="metric-value" id="agent-count">0</div></div>
                <div class="metric"><div class="metric-label">Task 数量</div><div class="metric-value" id="task-count">0</div></div>
                <div class="metric"><div class="metric-label">Crew 数量</div><div class="metric-value">0</div></div>
                <div class="metric"><div class="metric-label">调研次数</div><div class="metric-value" id="history-count">0</div></div>
            </div>
            <div class="card-grid">
                <div class="section">
                    <div class="section-title">Agent 管理</div>
                    <div id="agent-list"></div>
                </div>
                <div class="section">
                    <div class="section-title">任务管理</div>
                    <div id="task-list"></div>
                </div>
            </div>
        </div>
        
        <div class="content" id="new-page" style="display: none;">
            <div class="section">
                <div class="form-group">
                    <label class="form-label">调研主题</label>
                    <input type="text" class="form-input" id="topic-input" placeholder="输入调研主题">
                </div>
                <button class="btn btn-primary" id="start-btn">开始调研</button>
            </div>
            <div class="spinner" id="spinner">正在执行调研，请稍候...</div>
            <div id="result-area"></div>
        </div>
        
        <div class="content" id="history-page" style="display: none;">
            <div class="section-title">调研历史</div>
            <div id="history-list"></div>
        </div>
    </div>
    
    <div class="modal" id="agent-modal">
        <div class="modal-content">
            <div class="modal-title">编辑 Agent</div>
            <div class="form-group"><label class="form-label">名称</label><input type="text" class="form-input" id="agent-name"></div>
            <div class="form-group"><label class="form-label">角色</label><input type="text" class="form-input" id="agent-role"></div>
            <div class="form-group"><label class="form-label">目标</label><input type="text" class="form-input" id="agent-goal"></div>
            <div class="form-group"><label class="form-label">背景</label><textarea class="form-input" id="agent-backstory" rows="3"></textarea></div>
            <div class="form-group"><label class="form-label"><input type="checkbox" id="agent-tools"> 启用搜索工具</label></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="save-agent">保存</button>
                <button class="btn" style="background:#f0f0f0;" id="close-agent">取消</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-title">编辑 Task</div>
            <div class="form-group"><label class="form-label">名称</label><input type="text" class="form-input" id="task-name"></div>
            <div class="form-group"><label class="form-label">描述</label><textarea class="form-input" id="task-desc" rows="3"></textarea></div>
            <div class="form-group"><label class="form-label">预期输出</label><input type="text" class="form-input" id="task-output"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="save-task">保存</button>
                <button class="btn" style="background:#f0f0f0;" id="close-task">取消</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
